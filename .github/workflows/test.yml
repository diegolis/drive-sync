name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Install test dependencies
        # Tests don't need pywebview/pystray (they mock the UI/tray layers),
        # so we install only what pytest needs. This keeps CI fast and avoids
        # pulling GTK/WebKit system bindings on every run.
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        working-directory: app
        run: python -m pytest -ra
